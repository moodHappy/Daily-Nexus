name: Daily Nexus Compiler

on:
  schedule:
    - cron: '0 23 * * 1'  # 每周北京/东京时间早上 7/8 点自动生成全知周报
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Compile Daily Archive
        run: python build_digest.py

      - name: Sync Archives to Github
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 【关键】：追踪整个 docs 目录，包含每日新建的归档文件和更新的 index
          git add docs/
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "Nexus: Daily archive sealed and calendar updated" && git push)
