name: Daily Nexus Compiler

on:
  schedule:
    - cron: '0 23 * * *'  # 每天北京/东京时间早上自动拉取全网数据
  workflow_dispatch:      # 保留手动触发开关

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Compile Dashboard
        run: python build_digest.py

      - name: Sync Pages
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Nexus: Synchronized daily omni-digest" && git push)